<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Brasil</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Menu -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Brasil</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link" href="cultura.html">Cultura e Turismo</a></li>
          <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container my-5">
    <h1 class="text-center mb-4">Entre em Contato</h1>
    <p class="text-center">
      Preencha o formulário abaixo para enviar sua opinião sobre o nosso site sobre o Brasil.
    </p>

    <div class="row justify-content-center">
      <div class="col-md-8">
        <form class="p-4 shadow rounded bg-light">
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
          </div>

          <div class="mb-3">
            <label for="cidade" class="form-label">Cidade</label>
            <input type="text" class="form-control" id="cidade" placeholder="Digite sua cidade">
          </div>

          <div class="mb-3">
            <label for="assunto" class="form-label">Assunto</label>
            <select class="form-select" id="assunto">
              <option selected>Escolha uma opção</option>
              <option>Dúvida</option>
              <option>Sugestão</option>
              <option>Elogio</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="mensagem" class="form-label">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>
          </div>

          <button type="submit" class="btn btn-success w-100">Enviar</button>
        </form>
      </div>
    </div>

    <div class="text-center mt-4">
      <p>Veja também:</p>
      <a href="https://www.gov.br/pt-br" target="_blank" class="btn btn-outline-primary me-2">Portal do Governo</a>
      <a href="https://www.ibge.gov.br/" target="_blank" class="btn btn-outline-success">IBGE</a>
    </div>
  </section>

  <footer class="bg-success text-white text-center py-3">
    <p class="mb-0">Página de Contato - Trabalho de PW III</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
